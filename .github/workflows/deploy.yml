name: Deploy to Host Africa

on:
  push:
    branches:
      - master  # ⚠️ MATCH THIS TO YOUR BRANCH NAME

jobs:
  deploy:
    name: 🚀 Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: 🛑 Get latest code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 📦 Install Dependencies
        run: npm ci

      - name: 🏗️ Build Project
        run: npm run build
      
      - name: 📂 Sync files to Host Africa (incremental - only changed files)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftp
          port: 21
          security: loose
          local-dir: ./out/
          # IMPORTANT: Set FTP_SERVER_DIR secret to your domain's document root
          # For addon domain eawestern.com, it's usually: /public_html/eawestern.com/
          # Check in cPanel → Domains → Addon Domains to see the exact path
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
          # Incremental sync - only uploads changed files (much faster!)
          # Remove files on server that don't exist locally (keeps things clean)
          dangerous-clean-slate: false
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**