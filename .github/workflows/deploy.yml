name: Deploy to Host Africa

on:
  push:
    branches:
      - master  # ⚠️ MATCH THIS TO YOUR BRANCH NAME

jobs:
  deploy:
    name: 🚀 Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: 🛑 Get latest code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 📦 Install Dependencies
        run: npm ci

      - name: 🏗️ Build Project
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        run: npm run build
      
      - name: 🔍 Verify Build Output
        run: |
          echo "Checking build output..."
          ls -la out/ | head -20
          echo "Checking for index.html..."
          ls -la out/index.html 2>/dev/null || echo "⚠️ index.html not found in out/"
          echo "Checking for en directory..."
          ls -la out/en/ 2>/dev/null || echo "⚠️ en directory not found"
      
      - name: 📂 Sync files to Host Africa (incremental - only changed files)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftp
          port: 21
          security: loose
          local-dir: ./out/
          # IMPORTANT: deploy into a writable directory (usually public_html or a subfolder inside it)
          # Example secret value: /public_html/  or  /public_html/ea-western/
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
          # Incremental sync - only uploads changed files (much faster!)
          # Remove files on server that don't exist locally (keeps things clean)
          dangerous-clean-slate: false
          
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
          # Don't fail on missing directories during cleanup
          log-level: verbose