name: Deploy to Host Africa

on:
  push:
    branches:
      - master  # ⚠️ MATCH THIS TO YOUR BRANCH NAME

jobs:
  deploy:
    name: 🚀 Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: 🛑 Get latest code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 📦 Install Dependencies
        run: npm ci

      - name: 🏗️ Build Project
        run: npm run build

      - name: 📂 Create _next folder structure (workaround for underscore restriction)
        run: |
          mkdir -p ./out/_next/static
          touch ./out/_next/.gitkeep
          touch ./out/_next/static/.gitkeep
      
      - name: 📂 Sync files to Host Africa
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftp
          port: 21
          security: loose
          local-dir: ./out/
          server-dir: ./
          dangerous-clean-slate: true
          log-level: verbose
          dry-run: false